name: Update Citation Data

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * *"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch citation data
        run: |
          cd google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

      - name: Commit results to google-scholar-stats branch
        run: |
          cd google_scholar_crawler/results
          git init
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          remote="https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add citations.json
          if git diff --cached --quiet; then
            echo "No citation changes to commit"
          else
            git commit -m "Update citation data"
            git push "${remote}" HEAD:google-scholar-stats --force
          fi
